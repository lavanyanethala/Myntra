
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration page</title>
<head>
        <body style="background-color:#f1f3f6;">

    <h1 style="background-color:rgb(207, 99, 219); color:white; padding:10px;">Register</h1>

    <form action="./login.html">
        <fieldset style="background-color:white; padding:20px;">
            <legend style="color:rgb(207, 99, 219);">Create Account</legend>

            <label>Name:</label><br>
            <input type="text"><br><br>

            <label>Email:</label><br>
            <input type="email"><br><br>

            <label>Password:</label><br>
            <input type="password"><br><br>

            <input type="submit" value="Register"
            style="background-color:rgb(79, 141, 199); color:white; padding:5px;">
        </fieldset>

    </form>

</body>
   
</head>
</html>
